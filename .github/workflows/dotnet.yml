name: Build

on:
  push:
    branches: [main, cross-platform]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runs-on: windows-latest
            rid: win-x64
            artifact: Noctis-windows-x64
            run-tests: true

          - name: macos-arm64
            runs-on: macos-14
            rid: osx-arm64
            artifact: Noctis-macos-arm64
            run-tests: false

          - name: macos-x64
            runs-on: macos-14
            rid: osx-x64
            artifact: Noctis-macos-x64
            run-tests: false

          - name: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
            artifact: Noctis-linux-x64
            run-tests: false

          - name: linux-arm64
            runs-on: ubuntu-latest
            rid: linux-arm64
            artifact: Noctis-linux-arm64
            run-tests: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/Noctis/Noctis.csproj -r ${{ matrix.rid }}

      - name: Build
        run: dotnet build src/Noctis/Noctis.csproj -c Release -r ${{ matrix.rid }} --no-restore

      - name: Run tests
        if: matrix.run-tests
        run: dotnet test tests/Noctis.Tests/Noctis.Tests.csproj -c Release -v minimal

      - name: Publish self-contained
        run: >
          dotnet publish src/Noctis/Noctis.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -o publish/${{ matrix.rid }}

      # Bundle ffmpeg for the Audio Converter feature so users don't need a
      # system install. Every download is version-PINNED and SHA-256-verified,
      # and a failure FAILS the build: the old continue-on-error meant an
      # outage (or a tampered/changed upstream binary, since "latest" was a
      # moving tag) shipped a release silently missing or altering ffmpeg.
      # To bump a pin: update the URL + hash together (sha256sum the download).
      - name: Bundle ffmpeg (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          $url = 'https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip'
          $expected = 'fa7d4d7e795db0e2503f49f105f46ed5852386f0cfdd819899be3b65ebde24fc'
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          $actual = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "ffmpeg.zip SHA-256 mismatch: got $actual" }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extract
          Copy-Item (Get-ChildItem -Recurse ffmpeg-extract -Filter ffmpeg.exe | Select-Object -First 1).FullName "publish/${{ matrix.rid }}/ffmpeg.exe"
          if (-not (Test-Path "publish/${{ matrix.rid }}/ffmpeg.exe")) { throw "ffmpeg.exe missing from payload" }

      - name: Bundle ffmpeg (macOS)
        if: startsWith(matrix.rid, 'osx-')
        run: |
          set -euo pipefail
          # evermeet.cx ships universal2 builds that work on both arm64 and x64.
          curl -sSL https://evermeet.cx/ffmpeg/ffmpeg-8.1.2.zip -o ffmpeg.zip
          echo "e91df72a1ee7c26606f90dd2dd4dcccc6a75140ff9ea6fdd50faae828b82ba69  ffmpeg.zip" | shasum -a 256 -c -
          unzip -q ffmpeg.zip -d ffmpeg-extract
          cp ffmpeg-extract/ffmpeg "publish/${{ matrix.rid }}/ffmpeg"
          chmod +x "publish/${{ matrix.rid }}/ffmpeg"
          test -x "publish/${{ matrix.rid }}/ffmpeg"

      - name: Bundle ffmpeg (Linux x64)
        if: matrix.rid == 'linux-x64'
        run: |
          set -euo pipefail
          # BtbN's GitHub-hosted static build, pinned to a dated autobuild tag
          # (the "latest" tag is rewritten daily). johnvansickle.com was dropped
          # after going unreachable during the v1.2.6 release.
          curl -sSL https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-07-22-13-36/ffmpeg-N-125716-g1b1f602699-linux64-gpl.tar.xz -o ffmpeg.tar.xz
          echo "99bef6849a0b5bc9a5588b4e3ad7c183e29d4d55f3e2d7e7a175419bd21eecab  ffmpeg.tar.xz" | sha256sum -c -
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*-linux64-gpl/bin/ffmpeg "publish/${{ matrix.rid }}/ffmpeg"
          chmod +x "publish/${{ matrix.rid }}/ffmpeg"
          test -x "publish/${{ matrix.rid }}/ffmpeg"

      - name: Bundle ffmpeg (Linux arm64)
        if: matrix.rid == 'linux-arm64'
        run: |
          set -euo pipefail
          # Same pinned BtbN autobuild as linux-x64 (arm64 asset).
          curl -sSL https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-07-22-13-36/ffmpeg-N-125716-g1b1f602699-linuxarm64-gpl.tar.xz -o ffmpeg.tar.xz
          echo "9b9ce236268ce6bd82e074e1ccb46491115517cbf84b16623dab8aee9e5b45bb  ffmpeg.tar.xz" | sha256sum -c -
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*-linuxarm64-gpl/bin/ffmpeg "publish/${{ matrix.rid }}/ffmpeg"
          chmod +x "publish/${{ matrix.rid }}/ffmpeg"
          test -e "publish/${{ matrix.rid }}/ffmpeg"

      # ── macOS: bundle as Noctis.app, wrap in a .dmg ─────────────────
      - name: Package macOS .app + .dmg
        if: startsWith(matrix.rid, 'osx-')
        run: |
          set -euo pipefail
          APP="dist/Noctis.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          # Copy the published binary + all dependencies into the bundle
          cp -R publish/${{ matrix.rid }}/. "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/Noctis"

          # Build .icns from the canonical Windows .ico so the macOS dock icon
          # matches the Windows taskbar icon.
          brew install --quiet imagemagick
          ICONSET=Noctis.iconset
          mkdir -p "$ICONSET"
          SRC_ICO="src/Noctis/Assets/Icons/Noctis.ico"
          BASE_PNG=Noctis-base.png
          # .ico files contain multiple frames at different sizes. Pick the
          # largest frame so sips downsamples cleanly instead of upscaling
          # a tiny 16x16/32x32 frame and producing a blurry dock icon.
          LARGEST_IDX=$(magick identify "$SRC_ICO" \
            | awk '{print NR-1, $3}' \
            | awk -F'[ x]' '{print $1, $2}' \
            | sort -k2 -n | tail -1 | awk '{print $1}')
          magick "${SRC_ICO}[${LARGEST_IDX}]" -background none -resize 1024x1024 "${BASE_PNG}"
          for SIZE in 16 32 64 128 256 512; do
            DOUBLE=$((SIZE * 2))
            sips -z $SIZE  $SIZE  "$BASE_PNG" --out "$ICONSET/icon_${SIZE}x${SIZE}.png"
            sips -z $DOUBLE $DOUBLE "$BASE_PNG" --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/Noctis.icns"

          VERSION=$(grep -oE '<Version>[0-9.]+</Version>' src/Noctis/Noctis.csproj | grep -oE '[0-9.]+')

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Noctis</string>
            <key>CFBundleDisplayName</key><string>Noctis</string>
            <key>CFBundleIdentifier</key><string>com.heartached.noctis</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>Noctis</string>
            <key>CFBundleIconFile</key><string>Noctis</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # ── Ad-hoc code-sign the bundle ───────────────────────────────
          # Apple Silicon refuses to launch Mach-O code that isn't validly
          # signed: the kernel SIGKILLs it at exec, which presents as "the app
          # bounces in the dock once and immediately quits" with no crash log
          # (the kill happens before any managed code runs). Stripping the
          # quarantine xattr does NOT bypass this — that only silences the
          # Gatekeeper prompt. We have no Apple Developer ID, so we ad-hoc sign
          # (`-`). Every nested Mach-O (the .NET host, helper executables, and
          # all dylibs incl. libvlc/Skia/Avalonia) must be signed before the
          # bundle is sealed. Sign nested Mach-O depth-first, then seal the
          # whole bundle with --deep (which signs the main binary and seals the
          # managed .dll assemblies as resources). Signing the main executable
          # by its direct path instead trips "code object is not signed at all /
          # In subcomponent: *.dll", because codesign then treats the flat
          # managed assemblies in Contents/MacOS as unsigned nested code.
          echo "Ad-hoc code-signing ${APP}"
          find "$APP/Contents/MacOS" -type f \
            \( -name "*.dylib" -o -name "ffmpeg" -o -name "createdump" \) \
            -exec codesign --force --timestamp=none --sign - {} +
          codesign --force --deep --timestamp=none --sign - "$APP"
          codesign --verify --deep --verbose=2 "$APP" || echo "::warning::codesign verify reported issues on $APP"

          # Build .dmg (uses macOS built-in hdiutil — no extra deps)
          DMG_NAME="Noctis-${{ matrix.rid }}.dmg"
          mkdir -p dist/dmg-staging
          cp -R "$APP" dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications
          # macOS runners intermittently fail here with
          # "hdiutil: create failed - Resource busy" when the staging volume is
          # still held by Spotlight/another process. Retry a few times.
          for attempt in 1 2 3 4 5; do
            if hdiutil create -volname "Noctis" \
                 -srcfolder dist/dmg-staging \
                 -ov -format UDZO \
                 "dist/${DMG_NAME}"; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "hdiutil create failed after 5 attempts" >&2
              exit 1
            fi
            echo "hdiutil create failed (attempt $attempt/5) — retrying in 5s…"
            sleep 5
          done

          mkdir -p packaged
          mv "dist/${DMG_NAME}" packaged/

          # Also ship a portable .zip of the .app bundle. Use ditto so the
          # executable bit, symlinks, and xattrs survive — `zip`/`tar` would
          # strip the executable bit on Contents/MacOS/Noctis.
          ZIP_NAME="Noctis-${{ matrix.rid }}.zip"
          ditto -c -k --keepParent "$APP" "packaged/${ZIP_NAME}"

      # ── Linux: build an AppImage ────────────────────────────────────
      - name: Package Linux AppImage
        if: startsWith(matrix.rid, 'linux-')
        run: |
          set -euo pipefail
          # Skip ARM64 packaging on x64 host — AppImage tools are arch-specific
          # and cross-architecture AppImage assembly is non-trivial. ARM64 ships
          # as a self-contained tarball instead.
          if [ "${{ matrix.rid }}" = "linux-arm64" ]; then
            VERSION=$(grep -oE '<Version>[0-9.]+</Version>' src/Noctis/Noctis.csproj | grep -oE '[0-9.]+')
            mkdir -p packaged
            tar -czf "packaged/Noctis-linux-arm64.tar.gz" -C publish/${{ matrix.rid }} .
            exit 0
          fi

          VERSION=$(grep -oE '<Version>[0-9.]+</Version>' src/Noctis/Noctis.csproj | grep -oE '[0-9.]+')

          # Assemble AppDir
          APPDIR=Noctis.AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp -R publish/${{ matrix.rid }}/. "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/Noctis"
          # Use the canonical Windows .ico (extracted to PNG) so the Linux
          # icon matches the Windows app icon. Ubuntu ships ImageMagick 6, so
          # we use the legacy `convert`/`identify` binaries (the unified
          # `magick` command is IM7+ only). Pick the largest frame in the .ico
          # so we downsample to 256 instead of upscaling a tiny frame.
          sudo apt-get install -y --no-install-recommends imagemagick
          SRC_ICO="src/Noctis/Assets/Icons/Noctis.ico"
          LARGEST_IDX=$(identify "$SRC_ICO" \
            | awk '{print NR-1, $3}' \
            | awk -F'[ x]' '{print $1, $2}' \
            | sort -k2 -n | tail -1 | awk '{print $1}')
          convert "${SRC_ICO}[${LARGEST_IDX}]" -background none -resize 256x256 noctis.png
          cp noctis.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/noctis.png"
          cp noctis.png "$APPDIR/noctis.png"
          ln -sf usr/bin/Noctis "$APPDIR/AppRun"

          cat > "$APPDIR/noctis.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=Noctis
          Comment=A music player that respects what's yours
          Exec=Noctis
          Icon=noctis
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          DESKTOP
          cp "$APPDIR/noctis.desktop" "$APPDIR/usr/share/applications/"

          # Fetch appimagetool — pinned release + SHA-256 (the "continuous" tag
          # is rewritten on every upstream commit). Pinned to the successor repo
          # AppImage/appimagetool: the old AppImageKit release assets were removed.
          wget -q https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage -O appimagetool
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  appimagetool" | sha256sum -c -
          chmod +x appimagetool

          mkdir -p packaged
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APPDIR" "packaged/Noctis-x86_64.AppImage"

          # Also ship a plain tarball alongside the AppImage so users on
          # distros without FUSE (or who prefer not to use AppImage) have a
          # portable archive option.
          tar -czf "packaged/Noctis-linux-x64.tar.gz" -C publish/${{ matrix.rid }} .

      - name: Upload artifact (raw publish folder)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload packaged artifact
        if: hashFiles('packaged/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-installer
          path: packaged
          if-no-files-found: error
          retention-days: 14
