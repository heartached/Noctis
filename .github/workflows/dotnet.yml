name: Build

on:
  push:
    branches: [main, cross-platform]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runs-on: windows-latest
            rid: win-x64
            artifact: Noctis-windows-x64
            run-tests: true

          - name: macos-arm64
            runs-on: macos-14
            rid: osx-arm64
            artifact: Noctis-macos-arm64
            run-tests: false

          - name: macos-x64
            runs-on: macos-14
            rid: osx-x64
            artifact: Noctis-macos-x64
            run-tests: false

          - name: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
            artifact: Noctis-linux-x64
            run-tests: false

          - name: linux-arm64
            runs-on: ubuntu-latest
            rid: linux-arm64
            artifact: Noctis-linux-arm64
            run-tests: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/Noctis/Noctis.csproj -r ${{ matrix.rid }}

      - name: Build
        run: dotnet build src/Noctis/Noctis.csproj -c Release -r ${{ matrix.rid }} --no-restore

      - name: Run tests
        if: matrix.run-tests
        run: dotnet test tests/Noctis.Tests/Noctis.Tests.csproj -c Release -v minimal

      - name: Publish self-contained
        run: >
          dotnet publish src/Noctis/Noctis.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -o publish/${{ matrix.rid }}

      # ── macOS: bundle as Noctis.app, wrap in a .dmg ─────────────────
      - name: Package macOS .app + .dmg
        if: startsWith(matrix.rid, 'osx-')
        run: |
          set -euo pipefail
          APP="dist/Noctis.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          # Copy the published binary + all dependencies into the bundle
          cp -R publish/${{ matrix.rid }}/. "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/Noctis"

          # Build .icns from the canonical Windows .ico so the macOS dock icon
          # matches the Windows taskbar icon.
          brew install --quiet imagemagick
          ICONSET=Noctis.iconset
          mkdir -p "$ICONSET"
          SRC_ICO="src/Noctis/Assets/Icons/Noctis.ico"
          BASE_PNG=Noctis-base.png
          # Extract the first frame from the .ico, upscale to 1024 so sips can
          # downsample cleanly to every iconset size.
          magick "${SRC_ICO}[0]" -resize 1024x1024 "${BASE_PNG}"
          for SIZE in 16 32 64 128 256 512; do
            DOUBLE=$((SIZE * 2))
            sips -z $SIZE  $SIZE  "$BASE_PNG" --out "$ICONSET/icon_${SIZE}x${SIZE}.png"
            sips -z $DOUBLE $DOUBLE "$BASE_PNG" --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/Noctis.icns"

          VERSION=$(grep -oE '<Version>[0-9.]+</Version>' src/Noctis/Noctis.csproj | grep -oE '[0-9.]+')

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Noctis</string>
            <key>CFBundleDisplayName</key><string>Noctis</string>
            <key>CFBundleIdentifier</key><string>com.heartached.noctis</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>Noctis</string>
            <key>CFBundleIconFile</key><string>Noctis</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Build .dmg (uses macOS built-in hdiutil — no extra deps)
          DMG_NAME="Noctis-${VERSION}-${{ matrix.rid }}.dmg"
          mkdir -p dist/dmg-staging
          cp -R "$APP" dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications
          hdiutil create -volname "Noctis" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            "dist/${DMG_NAME}"

          mkdir -p packaged
          mv "dist/${DMG_NAME}" packaged/

      # ── Linux: build an AppImage ────────────────────────────────────
      - name: Package Linux AppImage
        if: startsWith(matrix.rid, 'linux-')
        run: |
          set -euo pipefail
          # Skip ARM64 packaging on x64 host — AppImage tools are arch-specific
          # and cross-architecture AppImage assembly is non-trivial. ARM64 ships
          # as a self-contained tarball instead.
          if [ "${{ matrix.rid }}" = "linux-arm64" ]; then
            VERSION=$(grep -oE '<Version>[0-9.]+</Version>' src/Noctis/Noctis.csproj | grep -oE '[0-9.]+')
            mkdir -p packaged
            tar -czf "packaged/Noctis-${VERSION}-linux-arm64.tar.gz" -C publish/${{ matrix.rid }} .
            exit 0
          fi

          VERSION=$(grep -oE '<Version>[0-9.]+</Version>' src/Noctis/Noctis.csproj | grep -oE '[0-9.]+')

          # Assemble AppDir
          APPDIR=Noctis.AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp -R publish/${{ matrix.rid }}/. "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/Noctis"
          # Use the canonical Windows .ico (extracted to PNG) so the Linux
          # icon matches the Windows app icon. Ubuntu ships ImageMagick 6, so
          # we use the legacy `convert` binary (the unified `magick` command
          # is IM7+ only).
          sudo apt-get install -y --no-install-recommends imagemagick
          convert "src/Noctis/Assets/Icons/Noctis.ico[0]" -resize 256x256 noctis.png
          cp noctis.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/noctis.png"
          cp noctis.png "$APPDIR/noctis.png"
          ln -sf usr/bin/Noctis "$APPDIR/AppRun"

          cat > "$APPDIR/noctis.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=Noctis
          Comment=A music player that respects what's yours
          Exec=Noctis
          Icon=noctis
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          DESKTOP
          cp "$APPDIR/noctis.desktop" "$APPDIR/usr/share/applications/"

          # Fetch appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          mkdir -p packaged
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APPDIR" "packaged/Noctis-${VERSION}-x86_64.AppImage"

      - name: Upload artifact (raw publish folder)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload packaged artifact
        if: hashFiles('packaged/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-installer
          path: packaged
          if-no-files-found: error
          retention-days: 14
