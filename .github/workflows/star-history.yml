name: Star History

# star-history.com can no longer chart repos anonymously (GitHub restricts
# stargazer data to repo admins/collaborators), so we render the chart
# ourselves with this workflow's GITHUB_TOKEN and publish it to the
# `star-history` branch, which the README embeds.
on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render star history SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/star_history.py charts

      # Force-push a single-commit orphan branch so chart updates never
      # pollute main's history.
      - name: Publish to star-history branch
        run: |
          cd charts
          git init -b star-history
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update star history chart"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" star-history
